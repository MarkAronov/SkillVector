# Fly.io configuration for SkillVector backend
# Docs: https://fly.io/docs/reference/configuration/
#
# Deploy:  flyctl launch --config fly.toml
# Secrets: flyctl secrets set OPENAI_API_KEY=... QDRANT_HOST=... etc.

app = "skillvector-api"
primary_region = "lax"  # Change to closest region to your Qdrant Cloud instance
                         # Options: iad (US East), lax (US West), lhr (London),
                         #          fra (Frankfurt), sin (Singapore), nrt (Tokyo)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT            = "3000"
  NODE_ENV        = "production"
  SKIP_STATIC_DATA = "true"

# Scale to zero: VM stops after 5 min of no traffic, wakes on next request
# Cold start: ~1–3s (image is cached, just resuming the VM)
# To keep always-on (for demos): set min_machines_running = 1
[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = "stop"   # Stop VM when idle
  auto_start_machines = true     # Wake on incoming request
  min_machines_running = 0       # Allow full scale-to-zero
  processes           = ["app"]

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-2x"  # 2 shared vCPUs
  memory = "512mb"

# Health check — Fly uses this to know when the VM is ready after a cold start
[[http_service.checks]]
  grace_period = "10s"
  interval     = "15s"
  method       = "GET"
  path         = "/health"
  timeout      = "5s"
